spring:
  profiles:
#    active: dev
#
    active: druid
  thymeleaf:
    mode: HTML
    encoding: utf-8
    # 禁用缓存
    cache: false
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: static/i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
#    default-property-inclusion: non_null
#  servlet:
#    multipart:
#      max-file-size: 2MB
#      max-request-size: 10MB

server:
  port: 9214
logging:
  level:
    com.taobao.logistics: debug
    org.springframework.jdbc: DEBUG
    org.springframework.boot.autoconfigure.jdbc: DEBUG
    com.alibaba.druid: DEBUG
  file:
#    不生效
    path: ${user.dir}/LOG/
    name: taobaoxsd.log

# 用户配置
user:
  password:
    # 密码错误{maxRetryCount}次锁定10分钟
    maxRetryCount: 10

# 日志清理配置
log:
  cleanup:
    # 日志文件保留天数，超过此天数的日志文件将被自动删除
    retention:
      days: 30
    # 是否启用定时清理
    enabled: true
    # 定时清理的cron表达式（默认每天凌晨2点执行）
    cron: "0 0 2 * * ?"
hswing:
  os-name: ${os.name}
  profile: ${user.dir}${file.separator}upload${file.separator}upload
  linux-upload: /home/test/upload


